name: ToolLab MVP CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: toollab-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: toollab-core/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toollab-ui/package-lock.json

      - name: Test backend
        working-directory: toollab-core
        run: |
          CGO_ENABLED=1 go test ./... -count=1
          CGO_ENABLED=1 go build -o /tmp/api ./cmd/api

      - name: Build frontend
        working-directory: toollab-ui
        run: |
          npm ci
          npm run typecheck
          npm run build
