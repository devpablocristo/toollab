services:
  toollab-dashboard:
    restart: unless-stopped
    build:
      context: .
      dockerfile: toollab-dashboard/Dockerfile
    environment:
      TOOLLAB_DASHBOARD_PORT: "${TOOLLAB_DASHBOARD_PORT:-8090}"
      TOOLLAB_DB_PATH: "/app/data/toollab.db"
      TOOLLAB_CORE_DIR: "/app/core"
      LLM_PROVIDER: "${LLM_PROVIDER:-gemini}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"
      GOOGLE_PROJECT_ID: "${GOOGLE_PROJECT_ID:-}"
      GOOGLE_REGION: "${GOOGLE_REGION:-us-central1}"
      VERTEX_MODEL: "${VERTEX_MODEL:-gemini-2.0-flash}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2}"
    ports:
      - "${TOOLLAB_DASHBOARD_PORT:-8090}:8090"
    volumes:
      - dashboard_data:/app/data
      - core_scenarios:/app/core/scenarios
      - core_runs:/app/core/golden_runs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  toollab-ui:
    restart: unless-stopped
    build:
      context: ./toollab-ui
      dockerfile: Dockerfile
      args:
        VITE_DASHBOARD_URL: "${VITE_DASHBOARD_URL:-http://localhost:8090}"
    depends_on:
      toollab-dashboard:
        condition: service_healthy
    ports:
      - "${TOOLLAB_UI_PORT:-5174}:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    restart: unless-stopped
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    profiles:
      - ollama

volumes:
  dashboard_data:
  core_scenarios:
  core_runs:
  ollama_data:
