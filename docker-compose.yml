services:
  backend:
    build:
      context: ./toollab-core
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - backend-data:/app/data
      - /home/pablocristo/Proyectos:/home/pablocristo/Proyectos:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TOOLLAB_ADDR=:8090
      - TOOLLAB_DB_PATH=/app/data/toollab.db
      - TOOLLAB_DATA_DIR=/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./toollab-ui
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
