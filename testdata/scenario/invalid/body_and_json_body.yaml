version: 1
mode: black
target:
  base_url: http://localhost:8080
  headers: {}
  auth:
    type: none
workload:
  requests:
    - id: bad
      method: POST
      path: /v1
      body: "x"
      json_body:
        x: 1
  concurrency: 1
  duration_s: 2
