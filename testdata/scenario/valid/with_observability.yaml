version: 1
mode: black
target:
  base_url: https://api.example.com
  headers:
    x-client: toolab
  auth:
    type: api_key
    api_key_env: TOOLAB_API_KEY
    in: header
    name: x-api-key
workload:
  requests:
    - id: create_order
      method: POST
      path: /orders
      json_body:
        sku: A1
        qty: 1
      timeout_ms: 3000
      weight: 2
      idempotency_key: "{{request_id}}-{{request_seq}}"
  concurrency: 1
  duration_s: 5
  schedule_mode: closed_loop
chaos:
  latency:
    mode: uniform
    min_ms: 0
    max_ms: 50
  error_rate: 0.05
  error_statuses: [429, 503]
  error_mode: abort
  flapping:
    enabled: true
    period_requests: 20
    down_ratio: 0.2
    behavior: abort
  payload_drift:
    enabled: true
    rate: 0.1
    allowed_mutations: [json_set, json_remove]
expectations:
  max_error_rate: 0.2
  max_p95_ms: 800
  invariants:
    - type: max_4xx_rate
      max: 0.3
seeds:
  run_seed: 111
  chaos_seed: 222
observability:
  metrics:
    endpoint: http://localhost:9090/metrics
    scrape_at: both
  traces:
    enabled: true
    endpoint: http://localhost:16686/api/traces
    query: service=api
  logs:
    enabled: true
    source: file
    file_path: ./logs.ndjson
redaction:
  headers: [authorization, x-api-key]
  json_paths: ["$.password"]
  mask: "***"
  max_body_preview_bytes: 2048
  max_samples: 20
