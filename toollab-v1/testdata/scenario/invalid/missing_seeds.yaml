version: 1
mode: black
target:
  base_url: http://localhost:8080
  headers: {}
  auth:
    type: none
workload:
  requests:
    - id: get_health
      method: GET
      path: /health
      body: ""
  concurrency: 1
  duration_s: 2
  schedule_mode: closed_loop
chaos:
  latency:
    mode: none
  error_rate: 0
  error_statuses: [503]
  error_mode: abort
expectations:
  max_error_rate: 0.1
  max_p95_ms: 200
  invariants: []
