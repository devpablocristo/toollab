services:
  toollab-v2-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: toollab-v2/Dockerfile
    environment:
      TOOLLAB_V2_ADDR: ":8090"
      TOOLLAB_V2_LLM_PROVIDER: "${TOOLLAB_V2_LLM_PROVIDER:-}"
      TOOLLAB_V2_LLM_MODEL: "${TOOLLAB_V2_LLM_MODEL:-}"
    ports:
      - "${TOOLLAB_V2_PORT:-8090}:8090"
    volumes:
      - "${TOOLLAB_SOURCES_ROOT:-/home/pablo/Projects/Pablo}:/workspace"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  toollab-ui:
    restart: unless-stopped
    build:
      context: ./toollab-ui
      dockerfile: Dockerfile
      args:
        VITE_DASHBOARD_URL: "${VITE_DASHBOARD_URL:-http://localhost:8090}"
    depends_on:
      toollab-v2-api:
        condition: service_healthy
    ports:
      - "${TOOLLAB_UI_PORT:-5174}:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    restart: unless-stopped
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    profiles:
      - ollama

volumes:
  ollama_data:
